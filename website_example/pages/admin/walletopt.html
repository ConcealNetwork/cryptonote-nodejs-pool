<!-- Wallet Optimization -->
<h3><i class="fa fa-money"></i> Wallet Optimization</h3>

<!-- Wallet Balance -->
<div class="card padding-15 padding-b-10">
    <h4>Wallet Balance</h4>
    <div>
        <div id="wallet_balance_message" role="alert"></div>
    </div>
    <div class="row">
        <div class="col-lg-6 col-md-8 col-sm-12 push-down-5">
            <div class="form-group">
                <label>Pool Wallet Address:</label>
                <input class="form-control" id="poolAddress" type="text" readonly>
            </div>
            <div class="form-group">
                <label>Available Balance:</label>
                <div class="input-group">
                    <input class="form-control" id="walletBalance" type="text" readonly>
                    <span class="input-group-addon" id="coinSymbol"></span>
                </div>
            </div>
            <button class="btn btn-primary" type="button" id="refreshBalanceButton">
                <i class="fa fa-refresh"></i> Refresh Balance
            </button>
        </div>
    </div>
</div>

<!-- Estimate Fusion -->
<h3><span>Estimate Fusion</span></h3>

<div class="card padding-15 padding-b-10">
    <div>
        <div id="estimate_fusion_message" role="alert"></div>
    </div>
    <div class="row">
        <div class="col-lg-4 col-md-5 col-sm-6 push-down-5">
            <div class="form-group">
                <label>Threshold:</label>
                <select class="form-control" id="estimateFusionThreshold">
                    <option value="1">1</option>
                    <option value="10">10</option>
                    <option value="100">100</option>
                    <option value="1000" selected>1,000</option>
                    <option value="10000">10,000</option>
                    <option value="100000">100,000</option>
                    <option value="1000000">1,000,000</option>
                </select>
            </div>
            <button class="btn btn-info" type="button" id="estimateFusionButton">
                <i class="fa fa-calculator"></i> Estimate Fusion
            </button>
        </div>
        <div class="col-lg-8 col-md-7 col-sm-6 push-down-5">
            <div class="form-group">
                <label>Result:</label>
                <textarea class="form-control" id="estimateFusionResult" rows="6" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<!-- Send Fusion Transaction -->
<h3><span>Send Fusion Transaction</span></h3>

<div class="card padding-15 padding-b-10">
    <div>
        <div id="send_fusion_message" role="alert"></div>
    </div>
    <div class="row">
        <div class="col-lg-4 col-md-5 col-sm-6 push-down-5">
            <div class="form-group">
                <label>Threshold:</label>
                <select class="form-control" id="sendFusionThreshold">
                    <option value="1">1</option>
                    <option value="10">10</option>
                    <option value="100">100</option>
                    <option value="1000" selected>1,000</option>
                    <option value="10000">10,000</option>
                    <option value="100000">100,000</option>
                    <option value="1000000">1,000,000</option>
                </select>
            </div>
            <div class="form-group">
                <label>Anonymity:</label>
                <select class="form-control" id="sendFusionAnonymity">
                    <option value="5">5</option>
                    <option value="4">4</option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                    <option value="0">0</option>
                </select>
            </div>
            <button class="btn btn-warning" type="button" id="sendFusionButton">
                <i class="fa fa-exchange"></i> Send Fusion Transaction
            </button>
        </div>
        <div class="col-lg-8 col-md-7 col-sm-6 push-down-5">
            <div class="form-group">
                <label>Result:</label>
                <textarea class="form-control" id="sendFusionResult" rows="6" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<script src="js/walletOpt.js"></script>
