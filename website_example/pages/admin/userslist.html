<h3>Users List (<span id="totalUsers">0</span> users)</h3>

<!-- Handlebars template -->
<script id="usersListTable" type="text/x-handlebars-template">
    {{#each users}}
    <tr>
        <td class="col1"><a href="/?wallet={{this.miner}}#worker_stats">{{this.miner}}</a></td>
        <td class="col2" data-sort="{{this.wallet.hashrate}}">{{this.readableHashrate}}</td>
        <td class="col3" data-sort="{{this.wallet.hashes}}">{{this.readableHashes}}</td>
        <td class="col4" data-sort="{{this.wallet.pending}}">{{this.readablePending}}</td>
        <td class="col5" data-sort="{{this.wallet.minPayoutLevel}}">{{this.readableThreshold}}</td>
        <td class="col6" data-sort="{{this.wallet.paid}}">{{this.readablePaid}}</td>
        <td class="col7" data-sort="{{this.wallet.lastShare}}">{{this.timeago}}</td>
        <td class="col8">
            {{#if this.hasPendingBalance}}
            <button class="btn btn-primary btn-sm pay-button" data-address="{{this.miner}}" data-balance="{{this.wallet.pending}}" title="Pay {{this.readablePending}} to this miner">
                <i class="fa fa-money"></i> Pay Now
            </button>
            {{else}}
            <span class="text-muted">No balance</span>
            {{/if}}
        </td>
    </tr>
    {{/each}}
</script>

<!-- Users list -->
<div class="card">
    <div class="table-responsive">
        <table class="table table-hover table-striped usersList">
            <thead>
            <tr>
                <th class="col1">Wallet</th>
                <th class="col2 sort">Hashrate <i class="fa fa-sort"></i></th>
                <th class="col3 sort">Hashes <i class="fa fa-sort"></i></th>
                <th class="col4 sort">Pending <i class="fa fa-sort"></i></th>
                <th class="col5 sort">Threshold <i class="fa fa-sort"></i></th>
                <th class="col6 sort">Paid <i class="fa fa-sort"></i></th>
                <th class="col7 sort">Last share <i class="fa fa-sort"></i></th>
                <th class="col8">Actions</th>
            </tr>
            </thead>
            <tbody id="template">

            </tbody>
        </table>
    </div>
</div>

<!-- Javascript -->
<script>
function parseUsers(wallets) {
    var totalUsers = 0;
    var walletsArray = [];
    var properObject = {};
    
    var defaultThreshold = lastStats.config.minPaymentThreshold || 1000000;

    for(var wallet in wallets) {
        if(wallets.hasOwnProperty(wallet)) {
            var userData = wallets[wallet];
            let userThreshold = userData.minPayoutLevel || defaultThreshold;
            
            walletsArray.push({
                miner: wallet,
                wallet: userData,
                timeago: $.timeago(new Date(userData.lastShare * 1000).toISOString()),
                readablePending: getReadableCoins(userData.pending, null, true),
                readablePaid: getReadableCoins(userData.paid, null, true),
                readableHashrate: getReadableHashRateString(userData.hashrate) + '/s',
                readableHashes: getReadableHashRateString(userData.hashes),
                hasPendingBalance: userData.pending && userData.pending > 0,
                readableThreshold: getReadableCoins(userThreshold, null, true)
            });
	    totalUsers++;
        }
    }
    $('#totalUsers').html(totalUsers);

    properObject['users'] = walletsArray.sort(function(a, b) {
        return a.wallet.hashrate - b.wallet.hashrate
    }).reverse();

    return properObject;
}

async function createUserTable() {
    try {
        const response = await fetch(api + '/admin_users', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include',
            cache: 'no-cache'
        });
        
        if (!response.ok) {
            if (response.status === 401) {
                // JWT expired, will be handled by global error handler
                return;
            }
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        renderTemplate(parseUsers(data), '#usersListTable', '#template');
        
        // Attach click handlers to pay buttons
        $('.pay-button').off('click').on('click', handleManualPayment);
    } catch (error) {
        console.error('Error loading users:', error);
    }
}

async function handleManualPayment(event) {
    const button = $(event.currentTarget);
    const address = button.data('address');
    const balance = button.data('balance');
    const readableBalance = getReadableCoins(balance, null, true);
    
    // Confirm payment
    if (!confirm(`Are you sure you want to send ${readableBalance} to:\n${address}?\n\nThis will reset their balance to zero and pay them immediately.`)) {
        return;
    }
    
    // Disable button and show loading
    button.prop('disabled', true);
    button.html('<i class="fa fa-spinner fa-spin"></i> Processing...');
    
    try {
        const response = await fetch(api + '/admin_manual_payment?address=' + encodeURIComponent(address), {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include',
            cache: 'no-cache'
        });
        
        if (!response.ok) {
            if (response.status === 401) {
                alert('Session expired. Please log in again.');
                window.location.href = '/admin-login.html';
                return;
            }
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const result = await response.json();
        
        if (result.status === 'success') {
            alert(`Payment successful!\n\nAmount: ${result.message}\nTransaction Hash: ${result.txHash}\n\nThe user's balance has been reset to zero.`);
            // Refresh the table
            createUserTable();
        } else if (result.status === 'warning') {
            alert(`Warning: ${result.message}\n\nPlease verify the transaction manually.`);
            createUserTable();
        } else {
            alert(`Payment failed: ${result.message}`);
            // Re-enable button
            button.prop('disabled', false);
            button.html('<i class="fa fa-money"></i> Pay Now');
        }
    } catch (error) {
        console.error('Error processing manual payment:', error);
        alert(`Error: ${error.message}`);
        // Re-enable button
        button.prop('disabled', false);
        button.html('<i class="fa fa-money"></i> Pay Now');
    }
}

$(function() {
    $('[data-toggle="tooltip"]').tooltip();
    $('.usersList th.sort').on('click', sortTable);
    createUserTable();
});
</script>
