<!-- Wallet OPS -->
<h3><i class="fa fa-cog"></i> Wallet OPS</h3>

<!-- Get Status -->
<div class="card padding-15 padding-b-10">
    <h4>Get Status</h4>
    <div>
        <div id="get_status_message" role="alert"></div>
    </div>
    <div class="row">
        <div class="col-lg-6 col-md-8 col-sm-12 push-down-5">
            <button class="btn btn-primary" type="button" id="getStatusButton">
                <i class="fa fa-play"></i> Get Status
            </button>
        </div>
        <div class="col-lg-6 col-md-8 col-sm-12 push-down-5">
            <div class="form-group">
                <label>Result:</label>
                <textarea class="form-control" id="getStatusResult" rows="6" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<!-- Save -->
<h3><span>Save</span></h3>

<div class="card padding-15 padding-b-10">
    <div>
        <div id="save_message" role="alert"></div>
    </div>
    <div class="row">
        <div class="col-lg-6 col-md-8 col-sm-12 push-down-5">
            <button class="btn btn-warning" type="button" id="saveButton">
                <i class="fa fa-save"></i> Save
            </button>
        </div>
        <div class="col-lg-6 col-md-8 col-sm-12 push-down-5">
            <div class="form-group">
                <label>Result:</label>
                <textarea class="form-control" id="saveResult" rows="6" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<!-- Get Transactions -->
<h3><span>Get Transactions</span></h3>

<div class="card padding-15 padding-b-10">
    <div>
        <div id="get_transactions_message" role="alert"></div>
    </div>
    <div class="row">
        <div class="col-lg-4 col-md-5 col-sm-6 push-down-5">
            <div class="form-group">
                <label>Block Count:</label>
                <input class="form-control" id="blockCount" type="number" value="100">
            </div>
            <div class="form-group">
                <label>First Block Index:</label>
                <input class="form-control" id="firstBlockIndex" type="number" value="0">
            </div>
            <button class="btn btn-info" type="button" id="getTransactionsButton">
                <i class="fa fa-list"></i> Get Transactions
            </button>
        </div>
        <div class="col-lg-8 col-md-7 col-sm-6 push-down-5">
            <div class="form-group">
                <label>Result:</label>
                <textarea class="form-control" id="getTransactionsResult" rows="12" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<script src="js/walletOps.js"></script>
