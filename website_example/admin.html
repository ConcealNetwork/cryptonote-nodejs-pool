<!-- Javascript -->
<script src="config.js?v=2"></script>
<script src="js/common.js?v=3.0"></script>
<script>
// Check JWT authentication on page load
$(function() {
    // Cookie is HttpOnly - can't read with JS (secure!)
    // Browser will send it automatically
    // Just proceed and let API return 401 if not authenticated
    initializeAdmin();
});
// Setup AJAX error handler for auth failures
$.ajaxSetup({
    xhrFields: {
        withCredentials: true  // Always send cookies
    },
    error: function(xhr, settings) {
        // If 401 on admin endpoint, not authenticated - redirect to login
        if (xhr.status === 401 && settings.url && settings.url.indexOf('/admin_') > -1) {
            window.location.href = '/admin-login.html';
        }
    }
});

// Initialize admin panel
function initializeAdmin() {
    // Fetch pool statistics
    lastStats = {};
    fetch(api + '/stats', {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' },
        cache: 'no-cache'
    })
    .then(response => response.json())
    .then(data => {
        lastStats = data;
        $('#poolVersion').html(lastStats.config.version);
        routePage();
    })
    .catch(error => {
        console.error('Error loading initial stats:', error);
    });
}

function fetchLiveStats() {
    fetch(api + '/live_stats', {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' },
        cache: 'no-cache'
    })
    .then(response => response.json())
    .then(data => {
        lastStats = data; // Store for config access
        if(currentPage.update) {
            currentPage.update();
        }
    })
    .catch(error => {
        console.error('Error fetching live stats:', error);
    })
    .finally(() => {
        // Use updateInterval from config, fallback to 3 seconds
        const interval = (lastStats && lastStats.config && lastStats.config.updateInterval) ? 
            lastStats.config.updateInterval * 1000 : 3000;
        setTimeout(() => fetchLiveStats(), interval);
    });
}

// Render template function
function renderTemplate(usersData, templateId, view) {
    var source = $(templateId).html(),
        template = Handlebars.compile(source),
        context = usersData,
        html = template(context);
    $(view).html(html);
}

// Initialize styles
$(function(){
    $("head").append("<link rel='stylesheet' href=" + themeCss + ">");
    $("head").append("<link rel='stylesheet' href=themes/admin.css>");
});

// Return to pool handler (clears JWT)
$('#returnToPoolBtn').on('click', function(e) {
    e.preventDefault();
    // Delete JWT cookie
    document.cookie = 'jwt=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
    // Redirect to pool
    window.location.href = '/';
});
</script>
